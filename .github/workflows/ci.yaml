name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.9"

      - run: uv pip install ruff==0.15.5

      - run: uv run ruff check .
      - run: uv run ruff format --check .
