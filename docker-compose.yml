services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - path: .env
        required: true
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_DB=${PG_DB}
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - "db_data:/var/lib/postgresql/data"

volumes:
  db_data:
